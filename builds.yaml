# grounded-forge build configuration
#
# Each profile is a slice of the matrix:
#   - All references (the reference axis)
#   - One task-domain's distillation directory (which includes the
#     per-task distillation index) — a column of the matrix, same
#     references, one task projection.
#   - The build-profile CLAUDE.md template
#
# Two profiles ship distinct content. That is the matrix architecture
# made visible: same references, different projections.
#
# Usage:
#   node build.js decision
#   node build.js stakeholder
#   node build.js --all
#   node build.js --list

defaults:
  source_dir: corpus.commons/demo
  output_base: ./corpus.commons/demo/apps

builds:

  # Architecture docs ship with both profiles and discuss both task
  # axes. Each profile expects cross-profile distillation paths to
  # dangle (decision does not ship stakeholder-engagement files,
  # and vice versa). The cross-profile entries below are intentional.

  decision:
    description: "Source-grounded decision-making assistant. Ships all references projected to the decision-making task axis, plus the lens library."
    output_dir: corpus.commons/demo/apps/decision

    # Per docs/architecture/capability-binding.md, the profile recommends
    # abstract capabilities; the user binds concretes in ~/.claude/capabilities.toml.
    # Demo profiles declare a minimal capability to exercise the pattern.
    recommends_capabilities:
      - name: notes-archive
        purpose: "Write the decision log + rationale to the user's notes system"
        fallback: "Output as markdown for the user to copy into their notes manually"

    # Distribution-scope ceiling. References whose Scope: exceeds this
    # rank are excluded at build time. Levels (low → high risk):
    # open, open-nc, copyrighted, confidential. `personal` is never
    # admitted by any profile. The demo corpus is uniformly open-nc /
    # open, so the mechanism is latent; downstream forks ingesting
    # confidential or personal material rely on this.
    max_scope: open-nc

    # Lens-visibility ceiling. Parallel to max_scope: lenses whose
    # visibility: exceeds this rank are excluded at build time. Same
    # taxonomy (open, open-nc, copyrighted, confidential, personal).
    # corpus.commons profiles ride at open-nc — the operator's redacted
    # named-real-person lens (chris-gagne-consultant-coach, open-nc)
    # ships intentionally; copyrighted, confidential, and personal lenses
    # are excluded.
    max_visibility: open-nc

    # All references travel with both profiles. The reference axis is
    # invariant; only the task projection differs per profile.
    references:
      include_patterns:
        - "*.md"
      exclude_patterns:
        # Pass A/H/I audit scaffolding lives alongside references in the
        # source repo as an integrity record. Not for shipping.
        - "_ingest_pass_*"
        - "_ingest_*"

    # The per-task distillation index lives inside its task directory
    # and is copied along with the distillations.
    distillations:
      include:
        - decision-making

    # The lens library ships with both profiles. Lenses are not a third
    # axis but per-distillation modifiers; their specs are shared across
    # task axes. Per-lens admission is driven by max_visibility above.
    lenses:
      include: true

    skills:
      include:
        # Runtime skills ship to the compiled app.
        # ingesting-resources, creating-tasks, creating-applications, and
        # creating-distillations are operator/maintainer tools that live in the
        # source repo; extending the corpus is not an app-time task.
        - matching-references
        - answer-from-library

    claude_md:
      template: decision

    # Architecture docs ship with both profiles so a reader of the
    # compiled distribution can audit the pattern they're using.
    docs:
      include:
        - docs/architecture
        - docs/assets/forge-hero.png
        - docs/assets/the-matrix.png
        - docs/assets/cost-curves.png
        - docs/reference
        - docs/README.md

    validation:
      ignore_dangling:
        # _planning/ is private and gitignored; references in source
        # docs to _planning/ are expected to dangle in apps/
        - "_planning/*"
        # docs/how-to/build-your-library.md ships only in the source
        # repo, not in compiled distributions: the audience is repo
        # forkers, not app consumers. Source-repo links to it
        # dangle in apps/ by design.
        - "docs/how-to/*"
        - "docs/how-to/"
        - "docs/tutorial/*"
        - "docs/tutorial/"
        # docs/sources/ is gitignored (raw PDF/EPUB inputs to
        # ingestion); references to it from documentation dangle
        # in apps/ by design.
        - "docs/sources/*"
        - "docs/sources/"
        # docs/evals/ is maintainer-only; the README and llm-epistemology.md
        # link to methodology.md and harness/ for transparency but the
        # shipped apps do not carry the harness.
        - "docs/evals/*"
        - "docs/evals/"
        # Cross-profile: architecture docs discuss all task axes.
        - "distillations/stakeholder-engagement/*"
        - "distillations/software-business/*"
        # Operator skills live in the source repo, not in apps;
        # source-repo references to them dangle in apps by design.
        - ".claude/skills/ingesting-resources/*"
        - ".claude/skills/creating-tasks/*"
        - ".claude/skills/creating-applications/*"
        - ".claude/skills/creating-distillations/*"
        - ".claude/skills/creating-lenses/*"
        - ".claude/skills/ingesting-images/*"
        - ".claude/skills/finding-resources/*"
        # Source-repo agent definitions that this profile doesn't ship
        # dangle in apps by design (not every profile carries every agent).
        - ".claude/agents/*"
        # Hook and plugin manifest live in the source repo, not in apps.
        - ".claude/hooks/*"
        - ".claude/settings.json"
        - ".claude-plugin/*"
        # Known-limitations doc is operator-facing (covers what's
        # partial in the demo corpus and how to complete or replace it);
        # not relevant to an app-runtime LLM consumer.
        - "docs/reference/known-limitations.md"
        # Pass I audit summaries and the per-source audit logs ship in
        # the source repo as the integrity record; not in apps.
        - "docs/audit-results/"
        - "docs/audit-results/*"
        - "references/_audit/"
        - "references/_audit/*"
        # Comparative eval harness ships in the source repo; not in apps.
        - "evals/"
        - "evals/*"
        # Pass I calibration + regression fixtures live in the source
        # repo; the shipped app runs the compiled assistant, not the
        # ingestion auditor. Source-repo references to them dangle by design.
        - "tests/"
        - "tests/*"
        - "tests/audit-fixtures/"
        - "tests/audit-fixtures/*"
        # Repo-root files referenced from architecture docs (build.js,
        # builds.yaml, LICENSE, LICENSE-CONTENT) live in the source repo
        # only; the apps ship compiled output, not the build tooling.
        # Paths to apps/ itself dangle inside apps/ by definition.
        - "build.js"
        - "builds.yaml"
        - "LICENSE"
        - "LICENSE-CONTENT"
        - "package.json"
        - "scripts/*"
        - "build-profiles/*"
        - "apps/"
        - "apps/*"
        - "corpus.commons/demo/"
        - "corpus.commons/demo/apps/"
        - "corpus.commons/demo/apps/*"
        - "corpus.commons/demo/sources/"
        - "corpus.commons/demo/sources/*"
        - "corpus.commons/demo/sources/converted/*"
        - "corpus.commons/demo/sources/original/*"
        - "corpus.commons/demo/distros/"
        - "corpus.commons/demo/distros/*"
        # creating-corpus skill lives in the source repo; the compiled
        # apps don't carry the maintainer skills.
        - ".claude/skills/creating-corpus/*"
        - ".claude/skills/creating-corpus/SKILL.md"
        # CONTRIBUTING and corpus-control README sections are operator-facing,
        # not for the app consumer.
        - "CONTRIBUTING.md"

