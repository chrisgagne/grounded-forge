- file: openstax-organizational-behavior-images/p0457-1.png
  source_ref: openstax-organizational-behavior
  page: 457
  description: |
    McKinsey 7S Framework hub-and-spoke diagram. Centre node "Shared Values"
    surrounded by six radial nodes — Structure, Systems, Style, Staff, Skills,
    Strategy — each with an arrow pointing inward to the centre.
  tags:
    - mckinsey-7s
    - shared-values
    - hub-and-spoke
    - org-effectiveness
  style: diagram
  suggested_use: |
    Use as a diagnostic — alignment among the seven S's predicts org
    effectiveness; misalignment localises the change problem.
- file: openstax-organizational-behavior-images/p0457-2.png
  source_ref: openstax-organizational-behavior
  page: 457
  description: |
    Strategic-management process diagram. Left column External Environment (SWOT:
    Strengths, Weaknesses, Opportunities, Threats) and Internal Organization
    (Leadership, Skills/Expertise, Performance History) feed President/officers,
    who develop Vision/mission/values → Operational goals/strategies/competitive
    advantage → Organization (Structural Type, Effectiveness vs Efficiency,
    Information/Control Systems, Production, HR Policies, Org Culture, Alliances)
