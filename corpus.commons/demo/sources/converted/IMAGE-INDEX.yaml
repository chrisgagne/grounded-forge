# Org Topologies Primer 2025 (ingested 2026-05-17):
# 41 images extracted from the 27-page PDF; visual classification of every
# image confirmed: 10 substantive diagrams (the OT Map and its variants,
# the empty-axes teaching variant, the lightbulb 'real problem' symbol,
# the OT mini-logo, the Strategic AI mini-logo) and 31 decoratives
# (footer logo bars, QR codes, accreditation badges, marketing promo
# cards, author selfie). Decoratives deleted; substantive entries below.

- file: org-topologies-primer-images/p0001-2.png
  source_ref: org-topologies-primer-2025
  page: 1
  description: |
    The Org Topologies™ mini-logo: a small 4x4 colour grid showing the
    four archetype-group quadrants (teal Whole-business top row, amber
    Partial-business, salmon Capabilities, lavender Tasks), overlaid
    with two pink axis arrows (up the left edge for Work Mandate;
    right along the bottom for Skills Mandate) and a black diagonal
    arrow pointing upper-right (the elevation direction). This is the
    framework's visual signature, recurring throughout the document
    as a brand mark.
  tags:
    - org-topologies
    - logo
    - elevation-direction
    - 2-axis-framing
  style: diagram
  frameworks:
    - name: org-topologies-primer-2025
      relevance: |
        Visual signature of the framework. The colour mapping (teal /
        amber / salmon / lavender for Whole-business / Partial-business
        / Capabilities / Tasks) is the colour code carried through the
        main OT Map diagram on p. 5 and its variants throughout.
  suggested_use: |
    Brand-mark callout. Use as a header / footer mark when teaching
    or facilitating any OT-based session.

- file: org-topologies-primer-images/p0006-1.jpeg
  source_ref: org-topologies-primer-2025
  page: 6
  description: |
    The central Org Topologies Map — the framework's load-bearing
    diagram. A 4×4 grid of named archetypes (16 cells total) with two
    axes: horizontal scope-of-skills-mandate (FUNCTIONAL → MULTI-SKILL
    → END-TO-END → EXPANDING → UNBOUNDED) and vertical scope-of-work-
    mandate (TASKS → CAPABILITIES → PARTIAL-BUSINESS → WHOLE-BUSINESS →
    UNBOUNDED). Each cell carries an archetype name with codes:
    TASKS-1..4 (Y0,Y1..Y4) in lavender at the bottom; CAPS-1..4 (A0,A1..
    A4) in salmon; PART-1..4 (B0,B1..B4) in amber; WHOLE-1..4 (C0,C1..
    C4) in teal at the top. Column labels above name the four archetype
    groups: DIRECTING (incomplete left columns), DOING (lower-left),
    DELIVERING (lower-right), DRIVING (complete right columns). Right-
    edge labels indicate the Output→Outcome axis (bottom = OUTPUTS,
    top = OUTCOMES). Lightbulb icon in upper-right corner marks the
    'real problem' destination at end-to-end + whole-business. Below
    the map: five small icons depicting unit types (human, AI agent,
    pool, team, team-of-teams) plus the OT mini-logo with CC BY-NC-SA
    badge and authors' names.
  tags:
    - org-topologies-map
    - 16-archetypes
    - 2-axis-framework
    - skills-mandate
    - work-mandate
    - directing-doing-delivering-driving
    - complete-vs-incomplete
    - output-vs-outcome
  style: diagram
  frameworks:
    - name: org-topologies-primer-2025
      relevance: |
        THE central diagram of the Primer. All other framework
        explanations refer back to this map. Pp. 11-13 (Resource,
        Delivery, Adaptive topologies) overlay archetype regions
        on this same map; the MADE method illustrations on pp. 16-19
        plot example organisations on this map.
  suggested_use: |
    Session opener for any OT-based work. Use during MAP phase to
    place organisational units on the grid; during ASSESS phase to
    visualise topology mismatch; during DESIGN phase to plot the
    target archetype set; during ELEVATE phase to show the upper-
    right movement vector. The 16 named archetypes are the OT
    vocabulary's load-bearing units.

- file: org-topologies-primer-images/p0007-2.jpeg
  source_ref: org-topologies-primer-2025
  page: 7
  description: |
    A black line-art lightbulb icon with a checkmark inside its bulb
    and short radiating lines suggesting illumination. Used by the
    Primer as the symbol for 'the real problem to solve' in the upper-
    right corner of every variant of the OT Map. The icon represents
    the destination archetype (Driving + Unbounded scope) where the
    real problem is finally seen and addressed end-to-end.
  tags:
    - real-problem-symbol
    - elevation-destination
    - icon
  style: illustration
  frameworks:
    - name: org-topologies-primer-2025
      relevance: |
        The 'lightbulb in the top-right corner' is referenced
        explicitly in the p. 6 prose: "The more capabilities the
        units have, the closer they are to the real problem, and
        the easier it is for them to create a skillful solution."
        The icon makes that destination concrete.
  suggested_use: |
    Pointer-symbol during teaching of the OT map's elevation
    direction. Useful when explaining why rightward + upward
    movement is the framework's normative pull.

- file: org-topologies-primer-images/p0009-2.jpeg
  source_ref: org-topologies-primer-2025
  page: 7
  description: |
    The bare OT Map axes — a clean two-arrow diagram with labelled
    vertical axis 'SCOPE OF WORK MANDATE' (less-to-more) and labelled
    horizontal axis 'SCOPE OF SKILLS MANDATE' (less-to-more), no
    archetype cells filled in. The teaching variant that introduces
    the two dimensions before populating them with named archetypes.
  tags:
    - two-axes
    - skills-mandate
    - work-mandate
    - teaching-variant
    - empty-frame
  style: diagram
  frameworks:
    - name: org-topologies-primer-2025
      relevance: |
        The empty-axes variant is useful when first introducing the
        framework to people who would be overwhelmed by all 16 named
        archetypes at once. Establishes the two dimensions before the
        cell vocabulary lands.
  suggested_use: |
    Phase 1 priming or initial-teaching: introduce the two dimensions
    on the blank axes before showing the populated map. Pair with the
    'two axes have economic interpretations' framing (horizontal =
    transaction cost; vertical = switching cost).

- file: org-topologies-primer-images/p0011-1.jpeg
  source_ref: org-topologies-primer-2025
  page: 9
  description: |
    Grayscale variant of the central OT Map — same 4×4 grid of 16
    named archetypes (TASKS, CAPS, PART, WHOLE × 1-4) with the same
    axes (SCOPE OF SKILLS MANDATE × SCOPE OF WORK MANDATE) and the
    same archetype-group quadrant labels (DIRECTING, DOING, DELIVERING,
    DRIVING) and Output/Outcome right-edge labels, but rendered in
    grayscale without colour fill. Useful as a print-friendly variant
    or when colour would distract from the structural points being
    made (incomplete vs complete archetypes split by the vertical
    midline; directing-vs-doing split by the horizontal midline).
  tags:
    - org-topologies-map
    - grayscale-variant
    - four-quadrants
    - archetype-groups
  style: diagram
  frameworks:
    - name: org-topologies-primer-2025
      relevance: |
        Grayscale variant of the p. 6 main map. Used on p. 9 to
        anchor the Four Archetype Groups discussion (Directing,
        Doing, Delivering, Driving) where the quadrant logic is
        the focus rather than the colour-coded vertical bands.
  suggested_use: |
    Use when teaching the four archetype groups specifically (without
    colour drawing attention to the Tasks/Caps/Part/Whole bands).
    Also the better print-handout variant.

- file: org-topologies-primer-images/p0017-2.png
  source_ref: org-topologies-primer-2025
  page: 11
  description: |
    Colour-filled variant of the central OT Map — full 4×4 grid of 16
    named archetypes (TASKS, CAPS, PART, WHOLE × 1-4) with vertical
    colour banding (lavender Tasks at bottom, salmon Capabilities,
    amber Partial-business, teal Whole-business at top). Includes the
    archetype-group quadrant labels, Output/Outcome right-edge,
    lightbulb 'real problem' marker, and the icons-and-mini-logo
    footer. Conceptually identical to p. 6 but rendered with colour
    bands rather than colour-per-cell.
  tags:
    - org-topologies-map
    - colour-band-variant
    - 16-archetypes
  style: diagram
  frameworks:
    - name: org-topologies-primer-2025
      relevance: |
        Appears on the Resource Topology page (p. 11) and is
        re-used through the three topology pages (pp. 11-13) and
        the MADE method illustrations (pp. 16-19) with topology-
        region overlays painted on top.
  suggested_use: |
    Backdrop for topology-region overlays when teaching the three
    named topologies (Resource = Directing+Doing lower-left;
    Delivery = Directing+Delivering with cross-functional teams;
    Adaptive = Driving region upper-right).

- file: org-topologies-primer-images/p0017-4.jpeg
  source_ref: org-topologies-primer-2025
  page: 11
  description: |
    Grayscale variant of the central OT Map labelled VERSION 2.0
    01.01.2025 (an interim revision of the 2025 Edition — the
    published Primer is dated 02.2025). Same archetype names and
    axes as the main map. The version stamp differs from other map
    variants in the document (most are 02.2025); appears to be an
    earlier-cut of the same diagram pulled into the layout.
  tags:
    - org-topologies-map
    - grayscale-variant
    - interim-version
  style: diagram
  frameworks:
    - name: org-topologies-primer-2025
      relevance: |
        Versioning artefact: this map carries a 01.01.2025 stamp
        rather than the 02.2025 of the published Primer. Likely
        an earlier render that survived into the final layout.
        Conceptually identical to other grayscale variants.
  suggested_use: |
    Equivalent to the p. 9 grayscale variant for teaching purposes;
    the version-stamp difference is operationally irrelevant.

- file: org-topologies-primer-images/p0021-2.png
  source_ref: org-topologies-primer-2025
  page: 20
  description: |
    The Strategic AI™ mini-logo: the OT 4×4 colour grid (lavender /
    salmon / amber / teal vertical bands) with the two pink axis
    arrows (vertical Work Mandate, horizontal Skills Mandate), with
    large black bold 'AI' lettering overlaid across the middle and
    two small black sparkle-stars in the upper-right corner. The
    visual signature of the 2025 Edition's distinctive Strategic AI
    Adoption framing.
  tags:
    - strategic-ai
    - ai-workforce
    - 2025-edition-distinctive
    - logo
  style: diagram
  frameworks:
    - name: org-topologies-primer-2025
      relevance: |
        Brand mark for the Strategic AI Adoption section (pp. 20-21).
        The mark places AI inside the OT framework as a workforce
        element rather than as an external technology to be 'adopted'.
        Pairs with the load-bearing claim on p. 20: 'Specialization
        and expertise are vanishing as limited resources, due to
        intelligence as a service.'
  suggested_use: |
    Header / opener for any conversation about AI-integration org-
    design decisions. Useful when teaching the three guiding
    questions for strategic AI adoption (focus area, bottleneck,
    human monitoring).

- file: org-topologies-primer-images/p0021-3.jpeg
  source_ref: org-topologies-primer-2025
  page: 20
  description: |
    Grayscale variant of the central OT Map on the Strategic AI
    Adoption page. Same archetype grid, axes, and quadrant labels
    as other map variants, with the lightbulb 'real problem' marker
    in the upper-right corner. Used as a backdrop on the Strategic
    AI page to anchor the discussion that AI investment should be
    targeted at the elevation area (i.e. somewhere on the map,
    typically toward the upper-right).
  tags:
    - org-topologies-map
    - grayscale-variant
    - strategic-ai-context
  style: diagram
  frameworks:
    - name: org-topologies-primer-2025
      relevance: |
        Grayscale OT Map backdrop on the Strategic AI Adoption page.
        Reinforces that AI is a tool inside the org-design framework,
        not an alternative to it. The lightbulb marker remains as
        the elevation-direction reminder.
  suggested_use: |
    Pair with the three guiding questions when discussing where on
    the map AI investment should be focused for outsized bottleneck-
    dissolution impact.

- file: org-topologies-primer-images/p0023-2.jpeg
  source_ref: org-topologies-primer-2025
  page: 22
  description: |
    Colour-band variant of the central OT Map appearing on the
    Strategic Org Design vs. Framework Thinking page (p. 22) as the
    backdrop for the SAFe and Rendanheyi framework-mapping examples.
    Same archetype grid, axes, and quadrant labels as the other
    colour-band variants (lavender / salmon / amber / teal vertical
    bands), with the icons-and-mini-logo footer.
  tags:
    - org-topologies-map
    - colour-band-variant
    - framework-mapping-backdrop
  style: diagram
  frameworks:
    - name: org-topologies-primer-2025
      relevance: |
        Used as the underlying map on which named frameworks (SAFe,
        Rendanheyi, LeSS, Team Topologies, FAST Agile, Spotify Model,
        etc.) are plotted to show which topology region each
        framework typically produces. The mapping illustrations on
        p. 22 overlay SAFe and Rendanheyi regions on this base.
  suggested_use: |
    Backdrop for any 'where does framework X land on the OT map'
    teaching or facilitation move. The framework-region overlay is
    the move that makes the chain-of-fit (business strategy → org
    goal → topology → frameworks-as-tools) concrete.

