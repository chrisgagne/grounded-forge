    Era 2 1960s to 1980s; Era 3 Mid-1990s to present). Six structures plotted as
    a rising diagonal: 1 Functional Structure, 2 Divisional Structure, 3
    Geographic Structure, 4 Matrix Structure, 5 Networked Team Structure, 6
    Virtual Structure.
  tags:
    - structure-evolution
    - functional-to-virtual
    - mechanistic-to-organic
    - org-structures
  style: chart
  suggested_use: |
    Sequence the historical structures when explaining why a given organisation
