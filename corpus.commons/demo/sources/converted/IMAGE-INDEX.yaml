    - unfreeze-move-refreeze
    - change-management
  style: diagram
  suggested_use: |
    Use as a change-design checklist — most change efforts skip Unfreeze or
    Refreeze, producing temporary movement that reverts.
- file: openstax-organizational-behavior-images/p0485-1.png
  source_ref: openstax-organizational-behavior
  page: 485
  description: |
    Kotter's eight-step model of change rendered as a vertical list with a long
    downward arrow on the right. Steps: 1 Establish a sense of urgency; 2 Form a
    powerful guiding coalition; 3 Create a vision of change; 4 Communicate the
    vision; 5 Remove any obstacles; 6 Create small wins; 7 Consolidate
    improvements; 8 Anchor the change.
  tags:
    - kotter
    - eight-step-change
    - change-management
    - vision-coalition
  style: diagram
  suggested_use: |
    Audit a change initiative step-by-step; most stall at Step 5 (obstacles)
    or skip Step 1 (urgency).
- file: openstax-organizational-behavior-images/p0487-1.png
  source_ref: openstax-organizational-behavior
  page: 487
  description: |
    Side-by-side mapping of Kotter's 8-step model to Lewin's 3-step model.
    Kotter's steps 1-3 (urgency, coalition, vision) ↔ Lewin's Unfreeze
    (status quo examination, increasing driving forces, decreasing resisting
    forces). Kotter's 4-6 (communicate, remove obstacles, small wins) ↔ Lewin's
    Move (action, changes, involve people). Kotter's 7-8 (consolidate, anchor)
    ↔ Lewin's Refreeze (permanence, new way, reward).
  tags:
    - kotter-lewin-comparison
    - change-models
    - unfreeze-move-refreeze
    - eight-step-change
  style: diagram
  suggested_use: |
    Show that the two famous change models say compatible things — Kotter is
    more granular but maps to Lewin's three phases.
