- file: openstax-organizational-behavior-images/p0101-1.png
  source_ref: openstax-organizational-behavior
  page: 101
  description: |
    Four-stack diagram tracing the historical progression of learning theories:
    Classical Conditioning (observable behaviour and environmental determinants),
    Thorndyke's Law of Effect (consequences strengthen/weaken behaviours), Operant
    Conditioning (environmental cues and consequences influence operant behaviour),
    Social Learning Theory (self-control and vicarious learning in reciprocal
    person-behaviour-environment relationships). Downward arrows link each stage.
  tags:
    - learning-theory
    - classical-conditioning
    - operant-conditioning
    - social-learning
    - intellectual-history
  style: diagram
  suggested_use: |
    Sequence learning theories when explaining why modern reinforcement programmes
    inherit assumptions from each prior wave.
- file: openstax-organizational-behavior-images/p0102-1.png
  source_ref: openstax-organizational-behavior
  page: 102
  description: |
    Two-panel diagram contrasting Classical and Operant Conditioning. Upper panel
    (Classical): Unconditioned stimulus (food) and Conditioned stimulus (bell) both
    feed Response (salivation). Lower panel (Operant): Stimulus → Drive X habit
    (S-R bond) → Behavior → Reward; "Strengthened S-R bond" loops the reward back
    to the S-R bond, and "Drive reduction" loops from reward back to drive.
  tags:
    - classical-conditioning
    - operant-conditioning
    - reinforcement
    - s-r-bond
  style: diagram
  suggested_use: |
    Contrast the two conditioning mechanisms before designing a behaviour-change
    intervention — the operant loop maps directly onto reinforcement schedules.
- file: openstax-organizational-behavior-images/p0104-1.png
  source_ref: openstax-organizational-behavior
  page: 104
  description: |
    Bandura's social learning triangle. Three vertex nodes — Person (top), Behavior
    (bottom-left), Environment (bottom-right) — with double-headed arrows linking
    each pair. Three label boxes describe the mechanisms on each leg: Symbolic
    Processes ("Symbolic verbal or mental representations of reality help guide
    behavior"), Self-Control ("People control their own behavior to the extent that
    they rely on cognitive supports and manage relevant environmental cues and
    consequences"), and Vicarious Learning ("Most complex behavior is acquired by
    directly observing and imitating others in a social environment").
  tags:
    - bandura
    - social-learning-theory
    - vicarious-learning
    - self-control
    - reciprocal-determinism
  style: diagram
  suggested_use: |
    Anchor a discussion of modelling and observation in skill-acquisition or
