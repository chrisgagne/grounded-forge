    - meaning-making
  style: diagram
  suggested_use: |
    Open a communication-skills workshop by surfacing that meaning-making sits
    in the centre — practising any one skill in isolation misses the point.
- file: openstax-organizational-behavior-images/p0344-1.png
  source_ref: openstax-organizational-behavior
  page: 344
  description: |
    Leadership process triangle. Leader (apex), Context (bottom-left), Followers
    (bottom-right). Central circle "The Leadership Process" connected to all three
    vertices by bidirectional arrows. A lower circle "Consequence (e.g.,
    suspicion, trust, dislike, affection)" connects back to the leadership process
    and to the three vertices via feedback arrows.
  tags:
    - leadership-process
    - leader-follower-context
    - feedback-loop
    - triangle-diagram
  style: diagram
  suggested_use: |
    Counter the trait-and-style framings of leadership — locate "leadership" as
    the interaction among Leader/Context/Followers, not a property of the leader.
- file: openstax-organizational-behavior-images/p0350-1.png
  source_ref: openstax-organizational-behavior
  page: 350
  description: |
    Three-stage influence-and-effectiveness diagram. Leader (Influence/Power
    tactic, e.g., use of rationality) → Follower Compliance (Alienation &
    resistance, Calculative compliance, Identification, Internalization—Commitment)
    → Group Effectiveness (Follower satisfaction, Follower motivation, Follower
    performance). Caption: "Effective leadership is more likely to occur when the
    leader's influence flows out of rationality, expertise, moralistic appeal,
    and/or referent power."
  tags:
    - power-tactics
    - follower-compliance
    - kelman
    - leader-effectiveness
  style: diagram
  suggested_use: |
    Diagnose which compliance mode a follower is operating from — different
    leader tactics tend to produce different points on the alienation-to-
    commitment continuum.
- file: openstax-organizational-behavior-images/p0351-1.png
  source_ref: openstax-organizational-behavior
  page: 351
  description: |
    Tannenbaum-Schmidt leadership continuum. Horizontal axis runs Boss-Centered
    Leadership (left) to Subordinate-Centered Leadership (right) with seven
    intermediate behaviour points: Manager makes decision and announces it →
    Manager "sells" decision → Manager presents ideas and invites questions →
    Manager presents tentative decision subject to change → Manager presents
    problem, gets suggestions, makes decision → Manager defines limits, asks
    group to make decision → Manager permits subordinates to function within
    limits defined by superior. Top bar shows "Use of Authority by the Manager"
    decreasing left-to-right and "Area of Freedom for Subordinates" increasing.
    Bottom axis "Participation" runs Low to High; endpoint labels "Autocratic —
    leader is dominant in making decisions" / "Free rein — followers are free to
    choose; leader becomes passive."
  tags:
    - tannenbaum-schmidt
    - leadership-continuum
    - participation
    - boss-vs-subordinate-centred
  style: diagram
  suggested_use: |
    Locate a manager's typical style on the continuum, then ask which decision
    types warrant moving along it.
- file: openstax-organizational-behavior-images/p0352-1.png
  source_ref: openstax-organizational-behavior
  page: 352
  description: |
    2x2 matrix crossing Amount of Leader Direction (rows: High, Low) with Amount
    of Employee Participation in Decision-Making (columns: Low, High), yielding
    four leadership types. Cell 1 Directive Autocrat (high decision-power + high
    directing). Cell 2 Permissive Autocrat (high decision-power, low directing).
    Cell 3 Directive Democrat (low decision-power, high directing). Cell 4
    Permissive Democrat (low decision-power, low directing).
  tags:
    - leadership-types
    - autocratic-democratic
    - 2x2-matrix
    - decision-direction
  style: table
  suggested_use: |
    Refine the autocratic/democratic dichotomy by adding the directing dimension —
    permissive autocrats and directive democrats are common but unnamed in most
    discussions.
- file: openstax-organizational-behavior-images/p0358-1.png
  source_ref: openstax-organizational-behavior
  page: 358
  description: |
    Blake-Mouton Managerial Grid. 9x9 grid with Concern for Production on x-axis
    (Low to High) and Concern for People on y-axis (Low to High). Five named
    positions: 1,1 Indifferent (Evade and Elude); 1,9 Accommodating (Yield and
    Comply); 9,1 Controlling (Direct and Dominate); 5,5 Status Quo (Balance and
    Compromise); 9,9 Sound (Contribute and Commit). Each labelled with a
    first-person description of the manager's stance.
  tags:
    - blake-mouton
    - managerial-grid
    - concern-for-people
    - concern-for-production
  style: diagram
  suggested_use: |
    Use as a self-locating tool — managers identify where they sit, then plan
    movement toward 9,9.
- file: openstax-organizational-behavior-images/p0360-1.png
  source_ref: openstax-organizational-behavior
  page: 360
  description: |
    Fiedler's contingency model. Top graph: Performance (Good-Poor) plotted across
    eight situations from Favorable (left) to Unfavorable (right). Red "Task
    Motivated" line peaks Good at Favorable, dips Poor in Moderate, peaks Good
    again at Unfavorable. Blue "Relationship Motivated" line is inverse — Poor at
    extremes, peaks Good in Moderate. Below: 8-column truth table for each
    situation showing Leader-Member Relations (Good/Good/Good/Good/Poor/Poor/Poor/Poor),
    Task Structure (High/High/Low/Low/High/High/Low/Low), Leader Position Power
    (Strong/Weak/Strong/Weak/Strong/Weak/Strong/Weak).
  tags:
    - fiedler
    - contingency-model
    - task-vs-relationship-motivation
    - situational-favourableness
  style: chart
  suggested_use: |
    Match a leader's motivation style to the situation rather than coaching style
    change — Fiedler's contention is that motivation type is hard to shift.
- file: openstax-organizational-behavior-images/p0361-1.png
  source_ref: openstax-organizational-behavior
  page: 361
  description: |
    Path-Goal theory diagram. Two left boxes — Leader Behavior (Supportive,
    Directive, Participative, Achievement-oriented) and Situational Forces (Work
    environment, Subordinate characteristics) — feed a centre box "Combine to
    Influence," which feeds the right box Subordinate Outcomes (Motivation,
    Satisfaction, Performance).
  tags:
    - path-goal-theory
    - leader-behaviour
    - situational-leadership
    - subordinate-outcomes
  style: diagram
  suggested_use: |
    Coach leaders to vary their behaviour by situation — Path-Goal is a "match
    behaviour to context" model, not a one-style-fits-all.
- file: openstax-organizational-behavior-images/p0381-1.png
  source_ref: openstax-organizational-behavior
  page: 381
  description: |
    Triangle linking three concepts. Vertices: Power (apex), Authority
    (bottom-left), Leadership (bottom-right). Double-headed arrows on each edge
    show all three relate bidirectionally.
  tags:
    - power
    - authority
    - leadership
    - conceptual-triangle
  style: diagram
  suggested_use: |
    Use to clarify what is shared vs distinct among the three terms before
    diagnosing an influence dynamic.
- file: openstax-organizational-behavior-images/p0383-1.png
  source_ref: openstax-organizational-behavior
  page: 383
  description: |
    French-Raven five bases of power mapped against the cooperation continuum.
    Header arrow "Continuum of Employee Cooperation" runs Resistance →
    Compliance → Commitment. Below, five horizontal bars show how far each power
    source typically carries cooperation: Coercion (bar reaches only into
    Resistance-Compliance), Reward (reaches Compliance), Legitimate (reaches
    Compliance), Expert (reaches Commitment), Referent (reaches Commitment).
  tags:
    - french-raven
    - power-bases
    - cooperation-continuum
    - referent-expert-power
  style: chart
  suggested_use: |
    Show why "I have authority" is a poor proxy for influence — only expert and
    referent power reach commitment.
- file: openstax-organizational-behavior-images/p0384-1.png
  source_ref: openstax-organizational-behavior
  page: 384
  description: |
    Power-dependence model. Diagonal blue line slopes up from lower-left to
    upper-right against axes "Person A's power over B" (y) and "Person B's
    counterpower over A" (x). Right-side axis lists Person B's possible responses
    on a vertical scale: Comply with A (top), Bargain with A, Fight A, Ignore A
    (bottom). The line indicates more counterpower shifts B's response toward
    bargaining or ignoring.
  tags:
    - power-dependence
    - counterpower
    - emerson
    - bargaining
  style: chart
  suggested_use: |
    Diagnose why a "high-power" manager is being ignored or bargained with — the
    other party's counterpower is what determines the response, not the manager's
    formal power alone.
- file: openstax-organizational-behavior-images/p0391-1.png
  source_ref: openstax-organizational-behavior
  page: 391
  description: |
    2x2 matrix predicting probability of political behaviour. Rows: Competition
    among Employees (Low to High). Columns: Complexity and Uncertainty (Low to
    High). Cells: Low-Low = Low probability; Low-High = Medium; High-Low =
    Medium; High-High = High probability.
  tags:
    - organisational-politics
    - 2x2-matrix
    - uncertainty
    - competition
  style: table
  suggested_use: |
    Predict where political behaviour will emerge before it does — the
    high-competition + high-uncertainty cell is where it concentrates.
- file: openstax-organizational-behavior-images/p0393-1.png
  source_ref: openstax-organizational-behavior
  page: 393
  description: |
    Inverse line chart. Y-axis "Increased Political Behavior" plotted against
    x-axis "Increased Standard Operating Procedures." A descending line shows
    that as SOPs increase, political behaviour decreases.
  tags:
    - organisational-politics
    - standard-operating-procedures
    - bureaucracy
    - line-chart
  style: chart
  suggested_use: |
    Show why standardising procedures can reduce political behaviour — but also
    raise the question of whether the trade-off (bureaucracy) is worth it.
- file: openstax-organizational-behavior-images/p0396-1.png
  source_ref: openstax-organizational-behavior
  page: 396
  description: |
    Strategic-contingencies model of subunit power. Three groupings of two-three
    antecedents feed three intermediate conditions which all feed "Amount of
    subunit power of A over B." Top: A forestalls uncertainty / provides
    information / absorbs pressures → A can help B cope with uncertainty. Middle:
    A is only source of B's inputs / A's personnel are irreplaceable → A's
    contributions have no or few substitutes. Bottom: A's workflow is pervasive /
    needed urgently → A's contributions are central to organisational success.
  tags:
    - hickson
    - strategic-contingencies
    - subunit-power
    - uncertainty-coping
  style: diagram
  suggested_use: |
    Diagnose why one department has outsized influence over another — locate
    the source in the three intermediate conditions.
- file: openstax-organizational-behavior-images/p0410-1.png
  source_ref: openstax-organizational-behavior
  page: 410
  description: |
    Conflict-outcome curve. X-axis Intensity (Low to High) with three zones (Too
    little conflict, Appropriate conflict, Too much conflict). Y-axis Outcomes
    (Negative to Positive). Curve is hump-shaped — outcomes are negative at low
    intensity, peak positive in the moderate zone, drop back negative at high
    intensity.
  tags:
    - conflict-intensity
    - conflict-outcomes
    - inverted-u
    - constructive-conflict
  style: chart
  suggested_use: |
    Counter the assumption that all conflict is destructive — the appropriate
    zone is where teams generate value from disagreement.
- file: openstax-organizational-behavior-images/p0413-1.png
  source_ref: openstax-organizational-behavior
  page: 413
  description: |
    Thomas's two-episode process model of conflict. Each episode (Episode 1 and
    Episode 2) traces a vertical sequence: Frustration → Conceptualization →
    Behavior → Outcome, with "Other's reactions" feeding sideways into
    Conceptualization and Behavior at each stage. Episode 2 follows Episode 1,
    showing iteration over time.
  tags:
    - thomas-conflict-model
    - conflict-process
    - frustration-conceptualization
    - episode-iteration
  style: diagram
  suggested_use: |
    Trace a real conflict through both episodes — each side's reactions become
    the other's inputs, often shifting frustration over time.
- file: openstax-organizational-behavior-images/p0415-1.png
  source_ref: openstax-organizational-behavior
  page: 415
  description: |
    Thomas-Kilmann conflict-mode matrix. Axes: Cooperativeness (x; attempting to
    satisfy the other party's concerns) and Assertiveness (y; attempting to
    satisfy one's own concerns). Five modes plotted: Competing (assertive,
    uncooperative), Collaborating (assertive, cooperative), Compromising (centre),
    Avoiding (unassertive, uncooperative), Accommodating (unassertive,
    cooperative).
  tags:
    - thomas-kilmann
    - conflict-modes
    - assertiveness-cooperativeness
    - 2x2-matrix
  style: diagram
  suggested_use: |
    Use as a self-assessment for default conflict mode; the goal is mode
    flexibility, not preference.
- file: openstax-organizational-behavior-images/p0420-1.png
  source_ref: openstax-organizational-behavior
  page: 420
  description: |
    Vertical list of nine conflict-reduction strategies ordered by Target of
    Change — top end "Behavior" to bottom end "Attitudes" (a long arrow runs
    down the side indicating the gradient). Strategies in order: 1 Physical
    separation, 2 Bureaucratic method, 3 Limited interaction, 4 Integrators, 5
    Confrontation and negotiation, 6 Third-party consultants, 7 Rotation of
    members, 8 Interdependent tasks and superordinate goals, 9 Intergroup
    training.
  tags:
    - conflict-reduction
    - intervention-strategies
    - behaviour-vs-attitudes
    - intergroup-training
  style: diagram
  suggested_use: |
    Pick the conflict-reduction strategy whose target (behaviour vs attitudes)
    matches what's actually broken.
- file: openstax-organizational-behavior-images/p0422-1.png
  source_ref: openstax-organizational-behavior
  page: 422
  description: |
    Bargaining-zone diagram. Two horizontal axes 0 to $300,000. Top axis "Seller's
    Asking price": Asking price near $300,000; Seller's resistance price somewhere
    centre-right. Bottom axis "Buyer's offer price": Offer price centre-left;
    Buyer's resistance price (maximum offer) at the seller-resistance line. A
    dashed rectangle "Bargaining zone" spans between the buyer's resistance and
    seller's resistance, the overlap where a deal is possible.
  tags:
    - negotiation
    - bargaining-zone
    - zopa
    - reservation-price
  style: diagram
  suggested_use: |
    Teach the ZOPA (zone of possible agreement) concept — without overlap
    between buyer and seller resistance, no deal exists.
- file: openstax-organizational-behavior-images/p0440-1.png
  source_ref: openstax-organizational-behavior
  page: 440
  description: |
    Five-arrow PEST-style environmental-forces diagram. Centre node "The
    Organization" surrounded by five tilted boxes with inward arrows:
    Technological Forces (information tech, new production, how tech is sold);
    Sociocultural Forces (demographic trends, lifestyle, skill availability,
    work attitudes, gender, willingness to move, ethics); Natural Disasters and
    Human-Induced Problems (weather, extreme storms, pollution, health/food/stress);
    Government & Political Forces (legislation, international law, wars, local
    regulations, taxation, trade unions); Economic Forces (globalization,
    competitors and supply chain, currency, employment/wage rates, lending
    policies).
  tags:
    - external-environment
    - pest-analysis
    - environmental-forces
    - strategic-context
  style: diagram
  suggested_use: |
    Scan the five force-categories when assessing an organisation's strategic
    context — none of them is optional in modern analysis.
- file: openstax-organizational-behavior-images/p0444-1.png
  source_ref: openstax-organizational-behavior
  page: 444
  description: |
    2x2 environment-industry matrix on Stability (rows) and Complexity (columns).
    Cell 1 Simple + Stable: Low Uncertainty — few external elements, similar
    elements that change slowly (examples: soft drink bottlers, container
    manufacturers, food processors). Cell 2 Complex + Stable: Low to Moderate
    Uncertainty — many dissimilar elements, slow change (universities, appliance
    manufacturers, chemical companies, insurance companies). Cell 3 Simple +
    Unstable: High to Moderate Uncertainty — few similar elements, frequent
    unpredictable change (e-commerce, fashion clothing, music industry, toy
    manufacturers). Cell 4 Complex + Unstable: High Uncertainty — many dissimilar
    elements, frequent unpredictable change (computer firms, aerospace,
    telecommunications, airlines).
  tags:
    - environmental-uncertainty
    - 2x2-matrix
    - complexity-stability
    - industry-classification
  style: table
  suggested_use: |
    Locate the organisation's industry on the matrix to predict the level of
    structural flexibility it needs to absorb.
- file: openstax-organizational-behavior-images/p0446-1.png
  source_ref: openstax-organizational-behavior
  page: 446
  description: |
    Mechanistic-vs-organic contrast. Left column "Mechanistic — Stable, low
    uncertainty environment" lists Top-down hierarchy, Narrow span of control,
    Specialized tasks, Formal rules, Vertical communication, Structured
    decision-making. Right column "Organic — Unstable, high uncertainty
    environment" lists Less rigid horizontal organization, Flexible few rules,
    Two-way communication, Participatory decision-making, Generalized shared
    tasks, Wide span of control.
  tags:
    - burns-stalker
    - mechanistic-organic
    - structure-environment-fit
    - comparison-diagram
  style: diagram
  suggested_use: |
    Counter the assumption that one structural type is "modern" — match the
    structure to the environment, not to ideology.
- file: openstax-organizational-behavior-images/p0448-1.png
  source_ref: openstax-organizational-behavior
  page: 448
  description: |
    Historical structure evolution chart. Y-axis from Mechanistic Systems (bottom)
