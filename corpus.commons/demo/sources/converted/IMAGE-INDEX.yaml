    in classic 1:2:1 ratio. Paired with a black-and-white photograph
    illustrating a phenotypic trait (chin cleft). Used in Ch 3.1 to
    introduce dominant / recessive alleles, homozygous / heterozygous
    genotypes, and the relationship between genotype and phenotype.
