  tags:
    - strategic-management-process
    - swot
    - vision-mission-values
    - effectiveness-outcomes
  style: diagram
  suggested_use: |
    Audit a strategy process against the full chain — most organisations skip
    or short-cut the SWOT-to-vision or outcomes-to-feedback link.
- file: openstax-organizational-behavior-images/p0459-1.png
  source_ref: openstax-organizational-behavior
  page: 459
  description: |
    Amazon executive structure org chart. CEO Jeff Bezos at the apex. Left column
    "Segments" lists Software Development, Retail Product Management and
