- file: openstax-organizational-behavior-images/p0056-1.png
  source_ref: openstax-organizational-behavior
  page: 56
  description: |
    Argyris's basic incongruity thesis visualised as a tension diagram. Top-left
    box lists what employees want from the organisation (meaningful work,
    flexibility/independence, skill development, equal treatment). Bottom-left
    box lists what the organisation wants from employees (follow rules, depend on
    org for rewards, perform simple repetitive tasks). Both feed a centre node
    "Basic incongruity between employee and organizational goals," which leads to
    the right box listing employee responses: withdrawal (turnover, absenteeism,
    drugs), striving for promotion, defense mechanisms, losing interest, union
    activity, quota restrictions, strikes, sabotage.
  tags:
    - argyris
    - incongruity-thesis
    - employee-organization-fit
    - withdrawal-behaviour
  style: diagram
  suggested_use: |
    Diagnose mismatches between job design and employee aspirations; the response
    column is a checklist of symptoms that an incongruity diagnosis would predict.
