- file: openstax-organizational-behavior-images/p0484-1.png
  source_ref: openstax-organizational-behavior
  page: 484
  description: |
    Lewin's three-step change model. Three stages connected by downward arrows:
    Unfreeze (Examine status quo, Increase driving forces for change, Decrease
    resisting forces against) → Move (Take action, Make changes, Involve people)
    → Refreeze (Make change permanent, Establish new way of things, Reward
    desired outcomes).
