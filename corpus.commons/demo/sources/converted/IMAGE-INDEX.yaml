# IMAGE-INDEX.yaml
#
# The persistent record of substantive images extracted from the
# source corpus. Image files live alongside the converted markdown
# at {prefix}-{source-slug}-images/ (siblings of {prefix}-{slug}.md)
# and are gitignored; this index is the durable artefact that
# travels with the repo. Paths are relative to this file's directory
# (corpus.commons/{corpus}/sources/converted/).
#
# Each entry records one image with:
#
#   file: {prefix}-{source-slug}-images/{filename}.{ext}
#   source_ref: {source-slug}        # matches a reference in corpus.commons/{corpus}/references/
#   page: {N}                        # PDF page number, or null for EPUB
#   description: |
#     Plain-language description, specific enough that a reader who
#     has not seen the image understands what it depicts.
#   tags:
#     - tag-one
#     - tag-two
#   style: diagram | chart | photo | cartoon | illustration | screenshot
#   frameworks:                       # optional cross-references
#     - name: {ref-slug}
#       relevance: |
#         How the image relates to the cited reference.
#   suggested_use: |
#     Where the image is most powerful in the operator's task
#     domain (e.g., during a particular phase of the framework's
#     application, or as a session opener).
#
# Classification is SUBSTANTIVE (kept and indexed) or DECORATIVE
# (deleted, not indexed). Only SUBSTANTIVE entries appear here.
#


# ============================================================
# openstax-organizational-behavior (OpenStax, CC BY-NC-SA 4.0)
# 122 substantive entries (re-authored 2026-05-18 from visual inspection of each image;
# replaces the Phase 2 pilot stub descriptions). All 122 images on disk were confirmed
# substantive on re-classification — no decoratives identified in this source.
# ============================================================

