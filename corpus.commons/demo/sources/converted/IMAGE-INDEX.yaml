- file: openstax-organizational-behavior-images/p0456-1.png
  source_ref: openstax-organizational-behavior
  page: 456
  description: |
    External-internal environment diagram. Centre oval "The Organization Internal
    Environment" containing two internal subsystems — Formal Subsystem (Leadership,
    Strategy, Management, Goals, Marketing, Operations, Technology, Structure) and
    Informal Subsystems (Managers, Culture, Norms, Relationships, Politics,
